<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Abdalrahman Alzaghal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="menubar">
    <div class="menubar-brand">~/<span>abdalrahman-alzaghal</span>/portfolio</div>
    <ul class="menu-tabs">
      <li><a href="index.html">home.html</a></li>
      <li><a href="contact.html" class="active">contact.html</a></li>
    </ul>
  </nav>

  <main>

    <section class="editor-window" id="contact-form">
      <div class="window-chrome">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
        <span class="filename">contact.html</span>
      </div>
      <div class="window-prose">
        <h3>get in touch</h3>
        <p style="color:var(--text-dim);">All fields are required — the form checks before it lets you submit.</p>
      </div>

      <form class="contact-form" id="contactForm" novalidate>

        <div class="field">
          <label for="fullName">Full name <span class="req">*</span></label>
          <input type="text" id="fullName" name="fullName" autocomplete="name">
          <span class="field-error" id="fullNameError"></span>
        </div>

        <div class="field">
          <label for="email">Email address <span class="req">*</span></label>
          <input type="email" id="email" name="email" autocomplete="email">
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="field">
          <label for="country">Country <span class="req">*</span></label>
          <input type="text" id="country" name="country" autocomplete="country-name">
          <span class="field-error" id="countryError"></span>
        </div>

        <div class="field">
          <label for="comments">Comments <span class="req">*</span></label>
          <textarea id="comments" name="comments"></textarea>
          <span class="field-error" id="commentsError"></span>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn">Submit</button>
          <a class="btn secondary" href="index.html">Back to home</a>
        </div>

      </form>
    </section>

  </main>

  <footer>
    &copy;
  </footer>

  <script src="script.js"></script>
</body>
</html>
